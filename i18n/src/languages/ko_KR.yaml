# SchemaForm for Preferences
prefs:
  about:
    label: About
    description: About InPageEdit
    header: '✏️ InPageEdit NEXT'
    intro: '🚀 Modular, Extensible Supercharged Plugin for MediaWiki.'
    portals:
      header: Portals
      officialwebsite: Official Website & Documentation
      updatelogs: Update Logs
    joinus:
      header: Join us
      github: GitHub
      qqgroup: QQ Group
    copyright: 'InPageEdit-NEXT Copyright © 2025-{{ new Date().getFullYear() }} dragon-fish'
  editor:
    label: Editor
  general:
    label: 일반
  inArticleLinks:
    $: In-article links preferences
    label: In-article Links
    enable: Enable in-article links
    quickDiff:
      enable: Enable in-article links for quick diff
    quickEdit:
      enable: Enable in-article links for quick edit
      redlinks: Show quick edit button for redlinks
  quickPreview:
    keyshortcut: Key shortcut to open quick preview in quick edit modal
  toolboxAlwaysShow:
    $: Toolbox™ preferences
    description: Make the Toolbox™ opened by default
  quickEdit:
    $: 빠른 편집 옵션
    editSummary: Default edit summary for quick edits
    editMinor: Default to checking "minor edit" option
    outSideClose: Close editor modal by clicking outside
    watchList: Watchlist options
    keyshortcut:
      save: save button key shortcut (blank to disable)
    editFont: Font to use in quick edit's textarea
  quickDiff:
    keyshortcut: Key shortcut to open quick diff in quick edit modal (blank to disable)
  quickRedirect:
    $: 빠른 넘겨주기 옵션
    reason: Default reason for quick redirect
  quickMove:
    $: 빠른 이동 옵션
    reason: Default reason for quick move
  language:
    $: Language preferences
    language: 언어
  analytics:
    $: InPageEdit Analytics
    enabled: Share my usage data with the community.
  sync:
    label: Sync
