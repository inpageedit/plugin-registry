"This wiki's url and site name.": "此 wiki 的網址和網站名稱。"
NO sensitive data will be collected.: 不會收集任何敏感資料。
Analytics Platform: 分析平台
View My Data: 檢視我的資料
Enable Analytics: 啟用分析
Help us improve InPageEdit by sharing your usage data with us.: 透過與我們分享您的使用資料，幫助我們改進 InPageEdit。
