# AnalyticsService
InPageEdit Analytics: InPageEdit Analytics
InPageEdit Analytics is the companion analytics platform for the InPageEdit NEXT project. By collecting and displaying usage data from around the world, it helps developers and the community better understand how the tool is used, optimize feature design, and enhance user experience.: InPageEdit Analytics 是 InPageEdit NEXT 專案的配套分析平台。透過收集和顯示來自全球的使用資料，它有助於開發者和社群更好地了解工具的使用情況、最佳化功能設計並提升使用者體驗。
What data will be collected?: 將會收集哪些資料？
Usage data: 使用資料
When and which features you use, what pages you edit, etc.: 您何時使用了哪些功能、編輯了哪些頁面等。
